<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLS - Pago de Energía</title>
    <!-- Ruta al CSS -->
    <link rel="stylesheet" href="../styles/2.11.css">
</head>
<body> 
    <header class="CLS">
        <h1>Compañía de Luz y Sombras</h1>
    </header>
    <div class="montos"> 
        <h2>Pago de energía eléctrica</h2>
        <form id="formMontos"> 
            <label for="kw">Ingrese consumo en kilowatts (KW)</label>
            <input type="number" id="kw" name="kw" placeholder="Ej. 150" required>

            <label for="tarifa">Ingrese tarifa por KW</label>
            <input type="number" id="tarifa" name="tarifa" placeholder="Ej. 2.5" required>

            <button type="button" onclick="multiplicacionCLS()">Enviar</button>
        </form>
        <p id="monto"></p>
    </div>

    <!-- Ruta al JS -->
    <script src="../scripts/problemas.js" defer></script>
</body>
</html>
